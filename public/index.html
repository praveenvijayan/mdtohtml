<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown → Web Page</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-head">
          <p class="chrome-label">Markdown E-Ink Console</p>
          <div class="header-hud-slot">
            <button
              id="hud-toggle"
              class="hud-toggle"
              type="button"
              aria-controls="header-hud"
              aria-expanded="true"
              aria-pressed="true"
            >
              Hide clock
            </button>
            <div id="header-hud" class="header-hud">
              <strong id="clock-time" class="hud-time">00:00</strong>
              <span id="clock-date" class="hud-date">01 Jan 1970</span>
            </div>
          </div>
        </div>
        <div class="brand">
          <span class="logo" aria-hidden="true">▣</span>
          <div class="brand-copy">
            <h1>Markdown → Paper Preview</h1>
            <p class="tagline">Draft on the platen, inspect the page before the ink dries.</p>
          </div>
        </div>
      </header>

      <main class="split">
        <section class="pane editor-pane">
          <div class="pane-head">
            <span class="pane-title pane-label">Input Deck</span>
            <span id="char-count" class="stat">0 chars</span>
            <span class="ink-fill-track" aria-hidden="true">
              <span id="ink-fill" class="ink-fill-bar"></span>
            </span>
            <span id="status" class="status" data-state="ready">ready</span>
            <span id="activity" class="status" data-state="ready">READY</span>
            <label class="flash-toggle">
              <input type="checkbox" id="flash-toggle" checked />
              flash
            </label>
          </div>
          <textarea
            id="input"
            spellcheck="false"
            autocomplete="off"
            aria-label="Markdown input"
          ></textarea>
        </section>

        <section class="pane preview-pane">
          <div class="pane-head">
            <span class="pane-title pane-label">Output Plate</span>
            <button class="font-toggle" id="font-toggle" aria-pressed="false">Serif</button>
            <span class="pane-meta">live render</span>
          </div>
          <article id="output" class="markdown-body" aria-live="polite"></article>
        </section>
      </main>

      <footer class="footerbar">
        <span class="footer-chip">
          <span class="footer-label">Words</span>
          <strong id="word-count" class="stat">0</strong>
        </span>
        <span class="footer-chip">
          <span class="footer-label">Lines</span>
          <strong id="line-count" class="stat">1</strong>
        </span>
        <span class="footer-chip">
          <span class="footer-label">Read time</span>
          <strong id="read-time" class="stat">1 min read</strong>
        </span>
      </footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
