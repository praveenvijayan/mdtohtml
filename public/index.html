<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown → Web Page</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <p class="chrome-label">Markdown E-Ink Console</p>
        <div class="brand">
          <span class="logo" aria-hidden="true">▣</span>
          <div class="brand-copy">
            <h1>Markdown → Paper Preview</h1>
            <p class="tagline">Draft on the platen, inspect the page before the ink dries.</p>
          </div>
        </div>
      </header>

      <main class="split">
        <section class="pane editor-pane">
          <div class="pane-head">
            <span class="pane-title">Input Deck</span>
            <span id="status" class="status" data-state="ready">ready</span>
          </div>
          <textarea
            id="input"
            spellcheck="false"
            autocomplete="off"
            aria-label="Markdown input"
          ></textarea>
        </section>

        <section class="pane preview-pane">
          <div class="pane-head">
            <span class="pane-title">Output Plate</span>
            <span class="pane-meta">live render</span>
          </div>
          <article id="output" class="markdown-body" aria-live="polite"></article>
        </section>
      </main>

      <footer class="footerbar">
        <span class="footer-chip">local styles only</span>
        <span class="footer-chip">system font fallback</span>
        <span class="footer-chip">split-view instrument</span>
      </footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
