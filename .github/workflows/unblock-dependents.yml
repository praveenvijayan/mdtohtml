name: unblock-dependents

# When an issue closes (e.g. via "Closes #N" on a merged PR), two jobs:
# 1. Strip the closed issue's own state:* label — the lifecycle labels describe
#    open work, and a lingering state:in-review on a closed issue misleads.
# 2. Find every issue blocked only by it and, if all their blockers are now
#    closed, re-feed it into the queue. Promotion is NOT unconditional: an
#    unblocked issue only goes to state:ready if it still carries acceptance
#    criteria; without them it is held at state:draft (an agent must never pick
#    an issue with no test plan). The ready-vs-draft decision is made by the
#    SAME shared helper the plan compiler uses (scripts/criteria.mjs), so the
#    two can never disagree.
# All of this lives in scripts/unblock-dependents.mjs so it can be regression-
# tested off the network; this workflow is only its trigger. The closed issue is
# read from the event payload at GITHUB_EVENT_PATH.

on:
  issues:
    types: [closed]

permissions:
  contents: read   # actions/checkout — a non-empty block drops this by default
  issues: write

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - run: node scripts/unblock-dependents.mjs
        env:
          # Prefer a PAT so this workflow can trigger further workflows.
          # Falls back to the default token (fine for pure human-merge flows).
          GITHUB_TOKEN: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
